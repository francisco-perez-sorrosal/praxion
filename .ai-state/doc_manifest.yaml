- id: ai-state-decisions-086-parallel-unsafe-and-marker-conflicts
  path: .ai-state/decisions/086-parallel-unsafe-and-marker-conflicts.md
  type: markdown
  title: "Parallel-unsafe groups isolate at runner level; kebab-id \u2192 snake_case marker form; reserved-name set"
  last_modified: '2026-05-08'
  renderer: adr_card
  summary: "Two coupled decisions on the marker/runner mechanics axis. First, parallel-unsafe groups (parallel_safe=false) run via a separate runner invocation rather than sharing a single invocation with\
    \ the safe groups \u2014 this is the trunk decision. The Python leaf concretization is \"two separate pytest invocations chained sequentially.\" Second, group ids are kebab-case for trunk identity and\
