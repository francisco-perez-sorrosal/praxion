# Release workflow -- bumps version, updates changelog, tags, and creates a GitHub Release.
#
# Two modes:
#   1. Auto (push to main): increments the .devN suffix (0.0.1.dev0 → 0.0.1.dev1 → ...).
#      No tags, no changelog, no GitHub release — just a version file bump committed with
#      [skip ci] to prevent re-triggering.
#   2. Manual (workflow_dispatch with "stable"): lets commitizen compute the proper semver
#      bump from conventional commits, generates CHANGELOG.md, tags, and creates a GitHub
#      release (e.g., 0.0.1.dev5 → 0.1.0). No .devN tags exist, so changelog works cleanly.

name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: cz
        continue-on-error: true
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'dev' }}"
          CURRENT=$(cz version --project)

          if [ "$RELEASE_TYPE" = "stable" ]; then
            # Stable: commitizen computes semver, generates changelog, commits, and tags
            cz bump --changelog --yes 2>&1 | tee bump_output.txt
          else
            # Dev: increment .devN suffix, keep base version fixed
            if echo "$CURRENT" | grep -qE '\.dev[0-9]+$'; then
              BASE="${CURRENT%.dev*}"
              DEV="${CURRENT##*.dev}"
              NEXT="${BASE}.dev$((DEV + 1))"
            else
              # After a stable release, start next patch dev cycle
              IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1)).dev0"
            fi

            # Skip if version already matches (idempotency for re-triggered runs)
            if [ "$CURRENT" = "$NEXT" ]; then
              echo "Version already at $NEXT, nothing to do"
              exit 1
            fi

            # Update version files only (no tag, no commit, no changelog)
            cz bump "$NEXT" --files-only --yes 2>&1 | tee bump_output.txt

            # Commit and push with [skip ci] to prevent re-triggering
            git add -A
            git commit -m "bump: version $CURRENT → $NEXT [skip ci]"
          fi
          echo "version=$(cz version --project)" >> $GITHUB_OUTPUT

      - name: Push
        if: steps.cz.outcome == 'success'
        run: git push --follow-tags

      - name: Create GitHub Release
        if: steps.cz.outcome == 'success' && (github.event.inputs.release_type == 'stable')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.cz.outputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
            exit 0
          fi
          gh release create "$VERSION" --generate-notes --title "$VERSION"
