# Release workflow -- bumps version, updates changelog, tags, and creates a GitHub Release.
#
# Two modes:
#   1. Auto (push to main): increments the .devN suffix (0.0.1.dev0 → 0.0.1.dev1 → ...).
#      No changelog generated — dev bumps are lightweight version increments only.
#      If the current version is stable (no .devN), starts a new dev cycle at <patch+1>.dev0.
#   2. Manual (workflow_dispatch with "stable"): lets commitizen compute the proper semver
#      bump from conventional commits (e.g., 0.0.1.dev5 → 0.1.0). Release notes are
#      auto-generated by GitHub, not CHANGELOG.md (commitizen can't parse .devN tags).
#
# Idempotency: The bump commit itself has no conventional commit prefix, so a re-triggered
# run finds no bumpable change. The dev bump script detects the tag already exists and
# exits cleanly. Downstream steps are conditional on bump success.

name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: cz
        continue-on-error: true
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'dev' }}"
          CURRENT=$(cz version --project)

          if [ "$RELEASE_TYPE" = "stable" ]; then
            # Stable: commitizen computes semver from conventional commits
            cz bump --yes 2>&1 | tee bump_output.txt
          else
            # Dev: increment .devN suffix, keep base version fixed
            if echo "$CURRENT" | grep -qE '\.dev[0-9]+$'; then
              BASE="${CURRENT%.dev*}"
              DEV="${CURRENT##*.dev}"
              NEXT="${BASE}.dev$((DEV + 1))"
            else
              # After a stable release, start next patch dev cycle
              IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1)).dev0"
            fi

            # Skip if this version is already tagged (idempotency)
            if git tag -l "v${NEXT}" | grep -q .; then
              echo "Tag v${NEXT} already exists, nothing to do"
              exit 1
            fi

            cz bump "$NEXT" --yes 2>&1 | tee bump_output.txt
          fi
          echo "version=$(cz version --project)" >> $GITHUB_OUTPUT

      - name: Push with tags
        if: steps.cz.outcome == 'success'
        run: git push --follow-tags

      - name: Create GitHub Release
        if: steps.cz.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.cz.outputs.version }}"
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'dev' }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
            exit 0
          fi
          if [ "$RELEASE_TYPE" = "stable" ]; then
            gh release create "$VERSION" --generate-notes --title "$VERSION"
          else
            gh release create "$VERSION" --generate-notes --title "$VERSION" --prerelease
          fi
