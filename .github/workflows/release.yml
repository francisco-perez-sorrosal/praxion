# Release workflow -- manual-only stable releases via workflow_dispatch.
#
# Commitizen computes the proper semver bump from conventional commits since
# the last stable tag, generates CHANGELOG.md, creates a git tag, and publishes
# a GitHub release.
#
# No CI runs on push to main. After a release, the workflow bumps version files
# to the next patch dev version (e.g., 0.2.0 → 0.2.1.dev0) so main always
# signals "unreleased development."

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        id: cz
        run: |
          cz bump --yes 2>&1 | tee bump_output.txt
          echo "version=$(cz version --project)" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          cz changelog
          git add CHANGELOG.md
          git commit -m "docs: Update CHANGELOG.md for v${{ steps.cz.outputs.version }}"

      - name: Push with tags
        run: git push --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.cz.outputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
            exit 0
          fi
          # Extract this version's section from CHANGELOG.md for the release body
          BODY=$(sed -n "/^## $VERSION/,/^## v/{/^## v[^$]/!p;}" CHANGELOG.md | sed '1d')
          gh release create "$VERSION" --title "$VERSION" --notes "$BODY"

      - name: Bump to next dev version
        run: |
          STABLE=$(cz version --project)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$STABLE"
          NEXT_DEV="${MAJOR}.${MINOR}.$((PATCH + 1)).dev0"
          cz bump "$NEXT_DEV" --files-only --yes
          # Marketplace-facing manifest stays at the stable version. Claude
          # Code uses .claude-plugin/plugin.json's `version` field as the
          # cache key for marketplace installs, so leaving it on `.dev0`
          # between releases caches every user install under the dev
          # snapshot directory (e.g., bit-agora/i-am/0.2.1.dev0/) — see
          # skills/versioning/SKILL.md "Marketplace versions vs. dev cycle".
          python3 - "$STABLE" <<'PY'
          import json, pathlib, sys
          p = pathlib.Path(".claude-plugin/plugin.json")
          d = json.loads(p.read_text())
          d["version"] = sys.argv[1]
          p.write_text(json.dumps(d, indent=2) + "\n")
          PY
          git add -A
          git commit -m "bump: Open $NEXT_DEV development cycle"
          git push
