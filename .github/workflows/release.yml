# Release workflow -- manual-only stable releases via workflow_dispatch.
#
# Commitizen computes the proper semver bump from conventional commits since
# the last stable tag, generates CHANGELOG.md, creates a git tag, and publishes
# a GitHub release.
#
# No CI runs on push to main. Between releases, the version in main reflects
# the last stable release.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        id: cz
        run: |
          cz bump --yes 2>&1 | tee bump_output.txt
          echo "version=$(cz version --project)" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          cz changelog
          git add CHANGELOG.md
          git commit --amend --no-edit

      - name: Push with tags
        run: git push --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.cz.outputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
            exit 0
          fi
          gh release create "$VERSION" --generate-notes --title "$VERSION"
